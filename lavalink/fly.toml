# Deploy with: fly launch --no-deploy (from this directory), then fly deploy
# The bot connects via fly.io private network: el-consejo-lavalink.internal:2333
app = "el-consejo-lavalink"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Only exposed internally — no public HTTP service needed
[[services]]
  protocol = "tcp"
  internal_port = 2333

  [[services.ports]]
    port = 2333

[env]
  # Set the password via: fly secrets set LAVALINK_PASSWORD=your_password

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
